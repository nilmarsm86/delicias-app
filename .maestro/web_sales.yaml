appId: 3a9dc74f-fd5a-4e53-a6da-66746a1c10ee

env:
  WEB_APP_URL: "http://localhost:8081"

- launchApp:
    appId: "chrome"
    url: "${WEB_APP_URL}"

# Agregar items
- tapOn:
    point: "50%,50%" # Primer item +
- tapOn:
    point: "50%,60%" # Segundo item +

# Guardar ventas
- tapOn: "Guardar"

# Verificar éxito
- assertVisible: "Ventas guardadas"